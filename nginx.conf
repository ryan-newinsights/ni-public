# nginx configuration for newinsights.ai
#
# This config handles:
# - newinsights.ai -> serves static landing page
# - www.newinsights.ai -> redirects to newinsights.ai
# - *.newinsights.ai (except scribe) -> redirects to newinsights.ai
#
# Setup:
# 1. Copy to /etc/nginx/sites-available/newinsights
# 2. ln -s /etc/nginx/sites-available/newinsights /etc/nginx/sites-enabled/
# 3. Update SSL paths to your certificate locations
# 4. nginx -t && systemctl reload nginx

# Redirect www and other subdomains to apex domain
server {
    listen 80;
    listen [::]:80;
    server_name www.newinsights.ai *.newinsights.ai;

    # Exclude scribe subdomain (handled by separate config)
    if ($host = scribe.newinsights.ai) {
        return 444;
    }

    return 301 https://newinsights.ai$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.newinsights.ai;

    # SSL configuration - update paths as needed
    ssl_certificate /etc/letsencrypt/live/newinsights.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newinsights.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://newinsights.ai$request_uri;
}

# Catch-all for other subdomains (except scribe)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.newinsights.ai;

    # SSL configuration - update paths as needed
    ssl_certificate /etc/letsencrypt/live/newinsights.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newinsights.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Exclude scribe subdomain
    if ($host = scribe.newinsights.ai) {
        return 444;
    }

    return 301 https://newinsights.ai$request_uri;
}

# HTTP -> HTTPS redirect for apex domain
server {
    listen 80;
    listen [::]:80;
    server_name newinsights.ai;
    return 301 https://newinsights.ai$request_uri;
}

# Main site - apex domain
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name newinsights.ai;

    # SSL configuration - update paths as needed
    ssl_certificate /etc/letsencrypt/live/newinsights.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newinsights.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Document root - update path as needed
    root /var/www/newinsights;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
