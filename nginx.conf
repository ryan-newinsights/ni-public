# nginx configuration for newinsights.ai
#
# Routing:
#   newinsights.ai/  -> static landing page (ni-public)
#   newinsights.ai/* -> proxy to Cloud Run (scribe)
#   www.newinsights.ai -> redirect to newinsights.ai
#   *.newinsights.ai (except scribe) -> redirect to newinsights.ai
#
# Setup:
#   1. Copy to /etc/nginx/sites-available/newinsights
#   2. ln -s /etc/nginx/sites-available/newinsights /etc/nginx/sites-enabled/
#   3. Update SSL paths to your certificate locations
#   4. nginx -t && systemctl reload nginx

# Conditionally set Connection header: "upgrade" for WebSocket requests,
# empty for normal HTTP (preserves keepalive).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# --------------------------------------------------------------------------
# Redirects
# --------------------------------------------------------------------------

# HTTP -> HTTPS for all domains
server {
    listen 80;
    listen [::]:80;
    server_name newinsights.ai www.newinsights.ai *.newinsights.ai;

    # Exclude scribe subdomain (handled by separate config)
    if ($host = scribe.newinsights.ai) {
        return 444;
    }

    return 301 https://newinsights.ai$request_uri;
}

# HTTPS: redirect www and other subdomains to apex domain
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.newinsights.ai *.newinsights.ai;

    ssl_certificate /etc/letsencrypt/live/newinsights.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newinsights.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Exclude scribe subdomain (handled by separate config)
    if ($host = scribe.newinsights.ai) {
        return 444;
    }

    return 301 https://newinsights.ai$request_uri;
}

# --------------------------------------------------------------------------
# Main site - apex domain
# --------------------------------------------------------------------------

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name newinsights.ai;

    ssl_certificate /etc/letsencrypt/live/newinsights.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newinsights.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Resolver for dynamic Cloud Run hostname resolution
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Static marketing pages
    location = / {
        root /var/www/newinsights;
        try_files /index.html =404;
    }

    location = /impressum.html {
        root /var/www/newinsights;
    }

    location = /privacy.html {
        root /var/www/newinsights;
    }

    location = /favicon.svg {
        root /var/www/newinsights;
    }

    # All other routes -> Cloud Run (scribe app)
    # Using a variable forces nginx to re-resolve DNS on each request,
    # which is required for Cloud Run where IPs can change.
    location / {
        set $scribe_backend https://scribe-zsixmoqh7a-ew.a.run.app;
        proxy_pass $scribe_backend;
        proxy_ssl_server_name on;

        proxy_set_header Host scribe-zsixmoqh7a-ew.a.run.app;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite Location headers from Cloud Run URL back to public domain
        proxy_redirect https://scribe-zsixmoqh7a-ew.a.run.app/ https://newinsights.ai/;

        # WebSocket support (for processing progress)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts for long-running doc generation
        proxy_read_timeout 300;
        proxy_connect_timeout 10;
        proxy_send_timeout 300;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
